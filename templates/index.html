<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🏠 House Price Prediction</title>
    <style>
        body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        }

        .container {
        width: 480px;
        background: white;
        padding: 35px;
        border-radius: 16px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        h1 {
        text-align: center;
        color: #2c3e50;
        margin-bottom: 25px;
        }

        .form-row {
        margin-bottom: 16px;
        }

        label {
        font-weight: bold;
        color: #2c3e50;
        display: block;
        margin-bottom: 6px;
        font-size: 14px;
        }

        input, select {
        width: 100%;
        padding: 11px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 15px;
        box-sizing: border-box;
        }

        button {
        width: 100%;
        padding: 14px;
        margin-top: 25px;
        border: none;
        background: linear-gradient(45deg, #4CAF50, #45a049);
        color: white;
        font-size: 17px;
        border-radius: 9px;
        cursor: pointer;
        transition: background 0.3s;
        box-shadow: 0 4px 10px rgba(76, 175, 80, 0.3);
        }

        button:hover {
        background: linear-gradient(45deg, #45a049, #3d8b40);
        }

        .result {
        margin-top: 25px;
        background: #d4edda;
        padding: 18px;
        border-radius: 10px;
        text-align: center;
        font-size: 19px;
        color: #155724;
        border: 1px solid #c3e6cb;
        }

        .emoji {
        margin-right: 6px;
        }
    </style>
    </head>
    <body>
    <div class="container">
        <h1>🏠 House Price Prediction 💰</h1>

        <form method="POST">
        <div class="form-row">
            <label class="emoji">📏 Area (sq ft)</label>
            <input type="number" name="area" value="{{ request.form.area }}" required>
        </div>

        <div class="form-row">
            <label class="emoji">🛏 Bedrooms</label>
            <input type="number" name="bedrooms" value="{{ request.form.bedrooms }}" required>
        </div>

        <div class="form-row">
            <label class="emoji">🚿 Bathrooms</label>
            <input type="number" name="bathrooms" value="{{ request.form.bathrooms }}" required>
        </div>

        <div class="form-row">
            <label class="emoji">🏢 Stories</label>
            <input type="number" name="stories" value="{{ request.form.stories }}" required>
        </div>

        <div class="form-row">
            <label class="emoji">🛣 Main Road</label>
            <select name="mainroad">
            <option value="1" {% if request.form.mainroad == "1" %}selected{% endif %}>Yes</option>
            <option value="0" {% if request.form.mainroad == "0" %}selected{% endif %}>No</option>
            </select>
        </div>

        <div class="form-row">
            <label class="emoji">🛋 Guest Room</label>
            <select name="guestroom">
            <option value="1" {% if request.form.guestroom == "1" %}selected{% endif %}>Yes</option>
            <option value="0" {% if request.form.guestroom == "0" %}selected{% endif %}>No</option>
            </select>
        </div>

        <div class="form-row">
            <label class="emoji">🏠 Basement</label>
            <select name="basement">
            <option value="1" {% if request.form.basement == "1" %}selected{% endif %}>Yes</option>
            <option value="0" {% if request.form.basement == "0" %}selected{% endif %}>No</option>
            </select>
        </div>

        <div class="form-row">
            <label class="emoji">🔥 Hot Water Heating</label>
            <select name="hotwaterheating">
            <option value="1" {% if request.form.hotwaterheating == "1" %}selected{% endif %}>Yes</option>
            <option value="0" {% if request.form.hotwaterheating == "0" %}selected{% endif %}>No</option>
            </select>
        </div>

        <div class="form-row">
            <label class="emoji">❄ Air Conditioning</label>
            <select name="airconditioning">
            <option value="1" {% if request.form.airconditioning == "1" %}selected{% endif %}>Yes</option>
            <option value="0" {% if request.form.airconditioning == "0" %}selected{% endif %}>No</option>
            </select>
        </div>

        <div class="form-row">
            <label class="emoji">🚗 Parking (spaces)</label>
            <input type="number" name="parking" value="{{ request.form.parking }}" required>
        </div>

        <div class="form-row">
            <label class="emoji">📍 Preferred Area</label>
            <select name="prefarea">
            <option value="1" {% if request.form.prefarea == "1" %}selected{% endif %}>Yes</option>
            <option value="0" {% if request.form.prefarea == "0" %}selected{% endif %}>No</option>
            </select>
        </div>

        <div class="form-row">
            <label class="emoji">🪑 Furnishing Status</label>
            <select name="furnishingstatus">
            <option value="0" {% if request.form.furnishingstatus == "0" %}selected{% endif %}>Unfurnished</option>
            <option value="1" {% if request.form.furnishingstatus == "1" %}selected{% endif %}>Semi Furnished</option>
            <option value="2" {% if request.form.furnishingstatus == "2" %}selected{% endif %}>Furnished</option>
            </select>
        </div>

        <button type="submit">🔮 Predict Price</button>
    </form>

    {% if prediction %}
    <div class="result">
        💰 Predicted House Price: <b>{{ prediction|inr }}</b>
    </div>
    {% endif %}
    </div>
</body>
</html>
